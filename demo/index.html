<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BPMN Auto Layout</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      color: #222;
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    header {
      background: #1a73e8;
      color: #fff;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    header h1 { font-size: 1.1rem; font-weight: 600; }

    #toolbar {
      background: #fff;
      border-bottom: 1px solid #ddd;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    #toolbar label {
      font-size: 0.85rem;
      color: #555;
      cursor: pointer;
    }

    #file-input { display: none; }

    .btn {
      padding: 7px 16px;
      border: none;
      border-radius: 4px;
      font-size: 0.85rem;
      cursor: pointer;
      font-weight: 500;
      transition: opacity 0.15s;
    }

    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary { background: #1a73e8; color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #1557b0; }

    .btn-secondary { background: #e8eaed; color: #333; }
    .btn-secondary:hover:not(:disabled) { background: #d2d4d7; }

    #file-label {
      padding: 7px 14px;
      border: 1px dashed #aaa;
      border-radius: 4px;
      font-size: 0.85rem;
      color: #555;
      cursor: pointer;
    }

    #file-label:hover { border-color: #1a73e8; color: #1a73e8; }

    #status {
      font-size: 0.8rem;
      color: #666;
      margin-left: auto;
    }

    #status.error { color: #c62828; }

    #canvas-wrap {
      flex: 1;
      display: flex;
      flex-direction: row;
      overflow: hidden;
    }

    .canvas-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .canvas-panel + .canvas-panel {
      border-left: 1px solid #ddd;
    }

    .panel-label {
      background: #f0f0f0;
      border-bottom: 1px solid #ddd;
      padding: 5px 12px;
      font-size: 0.78rem;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      flex-shrink: 0;
    }

    .canvas-viewer {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #fff;
    }

    /* bpmn-js injects its own styles; ensure the container fills space */
    .bjs-container { width: 100%; height: 100%; }

    #layout-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fafafa;
      color: #aaa;
      font-size: 0.9rem;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <header>
    <h1>BPMN Auto Layout</h1>
  </header>

  <div id="toolbar">
    <label id="file-label" for="file-input">&#128194; Choose .bpmn file…</label>
    <input type="file" id="file-input" accept=".bpmn,.xml" />
    <button id="layout-btn" class="btn btn-primary" disabled>Apply Layout</button>
    <button id="save-btn" class="btn btn-secondary" disabled>&#8595; Save .bpmn</button>
    <span id="status">No file selected</span>
  </div>

  <div id="canvas-wrap">
    <div class="canvas-panel">
      <div class="panel-label">Original</div>
      <div id="canvas-original" class="canvas-viewer"></div>
    </div>
    <div class="canvas-panel">
      <div class="panel-label">Laid out</div>
      <div id="canvas-layout" class="canvas-viewer">
        <div id="layout-placeholder">Apply layout to see result</div>
      </div>
    </div>
  </div>

  <script type="module" src="./main.ts"></script>
</body>
</html>
